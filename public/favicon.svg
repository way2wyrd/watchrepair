<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="30" fill="#1c1917" stroke="#d4a843" stroke-width="2"/>
  <!-- Main plate -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#d4a843" stroke-width="0.75" opacity="0.4"/>
  <!-- Balance wheel -->
  <circle cx="32" cy="20" r="7" fill="none" stroke="#d4a843" stroke-width="1.5"/>
  <circle cx="32" cy="20" r="1.5" fill="#d4a843"/>
  <line x1="32" y1="13" x2="32" y2="27" stroke="#d4a843" stroke-width="0.5" opacity="0.5"/>
  <line x1="25" y1="20" x2="39" y2="20" stroke="#d4a843" stroke-width="0.5" opacity="0.5"/>
  <!-- Balance spring (hairspring) -->
  <path d="M32 20 C34 18 34 16 32 16 C30 16 29 18 29 20 C29 22 31 23 33 22 C35 21 35.5 19 34 17.5" fill="none" stroke="#d4a843" stroke-width="0.6" opacity="0.7"/>
  <!-- Escape wheel -->
  <circle cx="32" cy="32" r="5" fill="none" stroke="#d4a843" stroke-width="1"/>
  <circle cx="32" cy="32" r="1" fill="#d4a843"/>
  <!-- Escape wheel teeth -->
  <line x1="32" y1="27" x2="32" y2="28.5" stroke="#d4a843" stroke-width="0.7"/>
  <line x1="36.5" y1="29.5" x2="35.3" y2="30.5" stroke="#d4a843" stroke-width="0.7"/>
  <line x1="37" y1="32" x2="35.5" y2="32" stroke="#d4a843" stroke-width="0.7"/>
  <line x1="36.5" y1="34.5" x2="35.3" y2="33.5" stroke="#d4a843" stroke-width="0.7"/>
  <line x1="32" y1="37" x2="32" y2="35.5" stroke="#d4a843" stroke-width="0.7"/>
  <line x1="27.5" y1="34.5" x2="28.7" y2="33.5" stroke="#d4a843" stroke-width="0.7"/>
  <line x1="27" y1="32" x2="28.5" y2="32" stroke="#d4a843" stroke-width="0.7"/>
  <line x1="27.5" y1="29.5" x2="28.7" y2="30.5" stroke="#d4a843" stroke-width="0.7"/>
  <!-- Barrel (mainspring) -->
  <circle cx="20" cy="44" r="6" fill="none" stroke="#d4a843" stroke-width="1"/>
  <circle cx="20" cy="44" r="1.2" fill="#d4a843"/>
  <!-- Barrel spiral -->
  <path d="M20 44 C21 43 21 42 20 42 C19 42 18.5 43 19 44 C19.5 45 21.5 45.5 22 44 C22.5 42.5 21 41 20 41" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.6"/>
  <!-- Third wheel -->
  <circle cx="44" cy="44" r="5" fill="none" stroke="#d4a843" stroke-width="0.8"/>
  <circle cx="44" cy="44" r="1" fill="#d4a843"/>
  <!-- Gear teeth hints on third wheel -->
  <line x1="44" y1="39" x2="44" y2="40.5" stroke="#d4a843" stroke-width="0.5"/>
  <line x1="49" y1="44" x2="47.5" y2="44" stroke="#d4a843" stroke-width="0.5"/>
  <line x1="44" y1="49" x2="44" y2="47.5" stroke="#d4a843" stroke-width="0.5"/>
  <line x1="39" y1="44" x2="40.5" y2="44" stroke="#d4a843" stroke-width="0.5"/>
  <!-- Bridge lines -->
  <line x1="32" y1="27" x2="32" y2="27" stroke="#d4a843" stroke-width="0.5" opacity="0.3"/>
  <!-- Jewel bearings -->
  <circle cx="32" cy="20" r="2.5" fill="none" stroke="#c4574b" stroke-width="0.5" opacity="0.6"/>
  <circle cx="32" cy="32" r="2" fill="none" stroke="#c4574b" stroke-width="0.5" opacity="0.6"/>
  <circle cx="20" cy="44" r="2.2" fill="none" stroke="#c4574b" stroke-width="0.5" opacity="0.6"/>
  <circle cx="44" cy="44" r="2" fill="none" stroke="#c4574b" stroke-width="0.5" opacity="0.6"/>
  <!-- Connecting bridges -->
  <line x1="32" y1="27" x2="32" y2="27" stroke="#d4a843" stroke-width="0.3"/>
  <path d="M26 44 L28.5 35 L32 37" fill="none" stroke="#d4a843" stroke-width="0.4" opacity="0.3"/>
  <path d="M37 32 L39 38 L39 44" fill="none" stroke="#d4a843" stroke-width="0.4" opacity="0.3"/>
</svg>
